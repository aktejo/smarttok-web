<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08080a">
<title>SmartTok — redesign workshop</title>
<meta name="description" content="Fullscreen scrollable card concept — a design playground on live data. The production UI lives at index.html.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/redesign.css">

<!-- Same engine as index.html — only the view layer is different. Deferred:
     downloads in parallel during parse, runs in order at DOM-ready. -->
<script defer src="js/models.js"></script>
<script defer src="js/proxy-config.js"></script>
<script defer src="adapters/wikipedia.js"></script>
<script defer src="adapters/dogs.js"></script>
<script defer src="adapters/cats.js"></script>
<script defer src="adapters/arxiv.js"></script>
<script defer src="adapters/pubmed.js"></script>
<script defer src="adapters/nasa.js"></script>
<script defer src="adapters/poetry.js"></script>
<script defer src="adapters/gutenberg.js"></script>
<script defer src="adapters/topics.js"></script>
<script defer src="adapters/philosophy.js"></script>
<script defer src="adapters/economics.js"></script>
<script defer src="adapters/core.js"></script>
<script defer src="adapters/index.js"></script>
<script defer src="js/mixer.js"></script>
<script defer src="js/settings.js"></script>
<script defer src="js/likes.js"></script>
<script defer src="js/feed-manager.js"></script>
<script defer src="js/summarizer.js"></script>
<script defer src="js/redesign-app.js"></script>
</head>
<body>

<div class="rd-frame">
  <main id="rd-scroller" class="rd-scroller"></main>

  <section id="rd-saved" class="rd-sheet">
    <div class="rd-sheet-head">
      <h2>Liked</h2>
      <button id="rd-saved-edit" class="rd-edit-btn">Edit</button>
    </div>
    <div id="rd-saved-chips" class="rd-chips"></div>
    <div id="rd-saved-list"></div>
  </section>

  <section id="rd-history" class="rd-sheet">
    <div class="rd-sheet-head">
      <h2>History</h2>
    </div>
    <div id="rd-history-list"></div>
  </section>

  <section id="rd-sources" class="rd-sheet">
    <h2>Sources</h2>
    <p class="rd-subtitle">Choose the sources you trust. We'll bring you the best from each.</p>
    <div id="rd-sources-list"></div>
    <p class="rd-hint">Toggles share the main app's settings store. Frequency is a concept mock — not wired to the mixer yet.</p>
  </section>

  <nav class="rd-nav">
    <button data-tab="today" data-icon="home" data-label="Today" class="active"></button>
    <button data-tab="saved" data-icon="heart" data-label="Liked"></button>
    <button data-tab="history" data-icon="clock" data-label="History"></button>
    <button data-tab="sources" data-icon="grid" data-label="Sources"></button>
  </nav>
</div>

</body>
</html>
